name: lint

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

jobs:
  lint:
    name: Lint + typecheck
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: ESLint
        run: npm run lint

      # Prettier format-check is intentionally left out of CI until the
      # codebase has been reformatted once (`npm run format`). Re-enable
      # by adding a step: `run: npm run format:check`.

      - name: TypeScript
        run: npx tsc --noEmit
